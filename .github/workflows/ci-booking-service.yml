name: CI — Booking Service
#
on:
  push:
    branches: [dev, develop, main]
  pull_request:
    branches: [dev, develop, main]

permissions:
  contents: write

jobs:
  ci:
    uses: Black-Tickets/shared-workflow/.github/workflows/ci-template.yml@main
    with:
      service-name: new_ticket-booking-service
      service-path: .
      runtime: node
      node-version: "18"
      environment: ${{ github.ref == 'refs/heads/main' && 'main' || 'develop' }}
      sonar-enabled: false
      notifications-enabled: true
      sonar-project-key: new_ticket-booking-service
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
